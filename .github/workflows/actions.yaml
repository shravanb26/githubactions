name: Build and Push to ECR

on:
  push:
    branches:
      - main

permissions:
  id-token: write   # REQUIRED for OIDC
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::279112112893:role/GithubActionsRole
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t actions:v1 .

      - name: Tag Image
        run: |
          docker tag actions:v1 279112112893.dkr.ecr.us-east-1.amazonaws.com/actions:v1

      - name: Push Image to ECR
        run: |
          docker push 279112112893.dkr.ecr.us-east-1.amazonaws.com/actions:v1
